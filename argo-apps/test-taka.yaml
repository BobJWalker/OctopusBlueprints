apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-taka
  namespace: argocd
  annotations:
    argo.octopus.com/environment: "test"
    argo.octopus.com/project: "taka"
spec:
  project: default
  source:
    repoURL: https://github.com/BobJWalker/TAKA.git
    path: k8s/overlays/test
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: test-taka
  syncPolicy:
    syncOptions:
      - CreateNamespace=true